<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Netflix</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <main>
        <h1>Quem está assistindo?</h1>
        <ul class="profiles" aria-label="Perfis de usuário">
            <li class="profile">
                <a href="catalogo/catalogo.html">
                    <figure>
                        <img src="/assets/alex.jpg"
                            alt="Foto de perfil de Alex Pereira, lutador com cinturão de campeão.">
                        <figcaption>Alex Pereira</figcaption>
                    </figure>
                </a>
            </li>
            <li class="profile">
                <a href="catalogo/catalogo.html">
                    <figure>
                        <img src="/assets/charles.jpg"
                            alt="Foto de perfil de Charles do Bronx, atleta em posição de luta.">
                        <figcaption>Charles do Bronx</figcaption>
                    </figure>
                </a>
            </li>
            <li class="profile">
                <a href="catalogo/catalogo.html">
                    <figure>
                        <img src="/assets/connor.jpg" alt="Foto de perfil de Connor Mc Gregor, lutador profissional.">
                        <figcaption>Connor Mc Gregor</figcaption>
                    </figure>
                </a>
            </li>
            <li class="profile">
                <a href="catalogo/catalogo.html">
                    <figure>
                        <img src="/assets/khabib.webp" alt="Foto de perfil de Khabib Nurmagomedov, campeão de MMA.">
                        <figcaption>Khabib Nurmagomedov</figcaption>
                    </figure>
                </a>
            </li>
        </ul>
        <div class="buttons">
            <button class="btn-gerenciar">Gerenciar perfis</button>
        </div>
    </main>
    <button id="theme-toggle" class="btn-theme-fixed" aria-label="Alternar tema">
        <span class="theme-icon theme-icon--moon">🌙</span>
        <span class="theme-icon theme-icon--sun">☀️</span>
        <span class="theme-knob"></span>
    </button>
    <script src="js/theme.js"></script>
    <script src="js/index.js"></script>
</body>

</html>
